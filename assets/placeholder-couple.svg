<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7e4e6"/>
      <stop offset="0.55" stop-color="#f6efe7"/>
      <stop offset="1" stop-color="#e9eee3"/>
    </linearGradient>
    <g id="petal"><ellipse cx="0" cy="-16" rx="10" ry="16" fill="#e8b7bf"/></g>
    <g id="flower">
      <use href="#petal"/>
      <use href="#petal" transform="rotate(72)"/>
      <use href="#petal" transform="rotate(144)"/>
      <use href="#petal" transform="rotate(216)"/>
      <use href="#petal" transform="rotate(288)"/>
      <circle r="6" fill="#c98a94"/>
