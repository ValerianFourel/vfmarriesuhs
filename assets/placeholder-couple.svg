  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g opacity="0.9">
    <use href="#flower" transform="translate(600 390) scale(2.4)"/>
    <use href="#flower" transform="translate(508 468) scale(1.25) rotate(24)"/>
    <use href="#flower" transform="translate(700 336) scale(1.5) rotate(-18)"/>
    <use href="#flower" transform="translate(668 476) scale(0.85) rotate(40)"/>
  </g>
  <rect x="26" y="26" width="1148" height="748" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.7"/>
